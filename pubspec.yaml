name: aether
description: A calm ambience + journaling app
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.2.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  just_audio: ^0.9.36
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  cupertino_icons: ^1.0.6


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.1

  build_runner: 2.4.13   
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/images/